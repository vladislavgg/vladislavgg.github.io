<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация | ThirstForTours</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                        url('img/hero.png') no-repeat center center/cover;
            margin: 0;
        }
        .auth-card {
            background: rgba(17, 17, 17, 0.95);
            border: 1px solid #333;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            position: relative;
            animation: fadeIn 1s ease-in-out;
        }
        .auth-card h1 {
            color: #fff;
            margin-bottom: 30px;
            font-weight: 400;
            letter-spacing: 2px;
        }
        .auth-card input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            font-family: Arial, sans-serif;
        }
        .auth-card input:focus { border-color: #fff; outline: none; }
        .close-link {
            position: absolute;
            top: 15px;
            right: 20px;
            color: #555;
            text-decoration: none;
            font-size: 24px;
        }
        .close-link:hover { color: #fff; }
    </style>
</head>
<body>
    <div class="auth-card">
        <a href="index.html" class="close-link">×</a>
        <h1>Регистрация</h1>
        <form id="regForm">
            <input type="text" id="uname" placeholder="Придумайте логин" required>
            <input type="password" id="pass" placeholder="Придумайте пароль" required>
            <button type="submit" id="submit" class="btn btn-filled" style="width: 100%; cursor: pointer;">Создать аккаунт</button>
        </form>
        <a href="avto.html" style="display:block; margin-top:20px; color:#ccc; font-size:13px; text-decoration:none; font-family:Arial;">Уже есть аккаунт? Войти</a>
    </div>

    <script>
        const sessi = supabase.createClient('https://ocszvkwesjjbbqhdstfs.supabase.co', 'sb_publishable_SgAdgbvq26qpo5d-pUNSwA_QcmOjr_R');

        document.getElementById("regForm").onsubmit = async function(e) {
            e.preventDefault();
            const u = document.querySelector("#uname").value;
            const p = document.querySelector("#pass").value;
            const s = document.querySelector("#submit");

            s.setAttribute('disabled', '1');
            s.innerText = "Создание...";

            const { data, error } = await sessi.from('users').insert({ username: u, password: p }).select();

            s.removeAttribute('disabled');
            s.innerText = "Создать аккаунт";

            if (!error) { 
                alert("Регистрация успешна!"); 
                window.location.href = 'avto.html';
            } else { 
                alert("Ошибка: " + error.message); 
            }
        }
    </script>
</body>

</html>
