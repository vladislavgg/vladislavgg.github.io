<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакты | ThirstForTours</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dark-bg">
    <header class="header">
        <div class="logo">TOURS</div>
        <nav class="nav">
            <ul>
                <li><a href="index.html">Главная</a></li>
                <li><a href="routes.html">Туры</a></li>
                <li><a href="schedule.html">Расписание</a></li>
                <li><a href="gallery.html">Галерея</a></li>
                <li><a href="contact.html" class="active">Контакты</a></li>
                <li><a href="reg.html">Регистрация</a></li>
                <li><a href="avto.html">Авторизация</a></li>
            </ul>
        </nav>
    </header>

    <section class="content-section">
        <h2 class="page-title">Индивидуальная экскурсия</h2>
        <div class="form-wrapper">
            <form action="#" method="POST" class="main-form">
                <fieldset>
                    <legend>Контактная информация</legend>
                    <label>Ваше имя:
                        <input type="text" name="username" required placeholder="Имя">
                    </label>
                    <label>Ваш Email:
                        <input type="email" name="useremail" required placeholder="email@test.ru">
                    </label>
                </fieldset>

                <fieldset>
                    <legend>Детали поездки</legend>
                    <label>Желаемая дата:
                        <input type="date" name="tour-date">
                    </label>
                    <label>Направление:
                        <select name="direction">
                            <option value="mountains">Горы</option>
                            <option value="forest">Леса</option>
                            <option value="water">Водоемы</option>
                        </select>
                    </label>
                    <label>Ваши пожелания:
                        <textarea name="comment" rows="4"></textarea>
                    </label>
                </fieldset>
                
                <button type="submit" class="btn btn-filled">Отправить заявку</button>
            </form>
        </div>
    </section>

    <footer class="main-footer">
        <p>&copy; 2026 THIRST FOR TOURS. Все права защищены.</p>
    </footer>
</body>
</html>
